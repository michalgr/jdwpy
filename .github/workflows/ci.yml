name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Ruff lint check
        run: uv run ruff check

      - name: Pyrefly type check
        run: uv run pyrefly check

      - name: Run tests
        run: uv run pytest

      - name: Run get_version example
        run: |
          javac -g tests/testdata/SimpleApp.java -d classes
          java -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=127.0.0.1:8000 -cp classes SimpleApp &
          JVM_PID=$!
          sleep 1
          uv run examples/get_version.py
          wait $JVM_PID

      - name: Run breakpoint_example
        run: |
          java -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=127.0.0.1:8000 -cp classes SimpleApp &
          JVM_PID=$!
          sleep 1
          uv run examples/breakpoint_example.py
          wait $JVM_PID
